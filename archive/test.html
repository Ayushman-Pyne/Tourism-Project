<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Cultural Museum Map</title>
    
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Georgia', serif; background: #1a1a1a; color: #f4f1ea; }
        #wrapper { display: flex; height: 100vh; }
        
        /* The Map */
        #map { flex: 1; height: 100%; border-right: 2px solid #3d3d3d; }

        /* The Museum Sidebar */
        #sidebar { 
            width: 400px; 
            padding: 40px; 
            overflow-y: auto; 
            background: #242424;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .museum-placeholder { text-align: center; color: #888; font-style: italic; }
        
        .exhibit-content h1 { color: #d4af37; margin-top: 0; font-size: 2.5rem; }
        .exhibit-content img { width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid #d4af37; }
        .exhibit-content p { line-height: 1.6; font-size: 1.1rem; color: #ccc; }
        .era-tag { 
            display: inline-block; 
            background: #d4af37; 
            color: #1a1a1a; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            margin-bottom: 10px;
        }

        /* Marker Styling */
        .custom-marker {
            background-color: #d4af37;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .custom-marker:hover { transform: scale(1.5); background-color: #fff; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="map"></div>
    
    <div id="sidebar" id="museum-panel">
        <div id="display-area">
            <div class="museum-placeholder">
                <p>Hover over a golden marker to explore history...</p>
            </div>
        </div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize the Map
    // Focused on Europe/Mediterranean for this demo
    const map = L.map('map').setView([35.0, 15.0], 4);

    // 2. Add a stylish "Museum-like" map skin (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 3. Your "Exhibit" Data (In real life, this would be an API or a larger JSON file)
    const historyData = [
        {
            id: 1,
            title: "The Colosseum",
            city: "Rome, Italy",
            coords: [41.8902, 12.4922],
            era: "Roman Empire",
            image: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=400&q=80",
            description: "Completed in 80 AD, the Colosseum was the largest amphitheatre ever built. It hosted gladiator contests, executions, and dramas based on Classical mythology."
        },
        {
            id: 2,
            title: "Parthenon",
            city: "Athens, Greece",
            coords: [37.9715, 23.7267],
            era: "Classical Greece",
            image: "https://images.unsplash.com/photo-1603566039115-509049d7f927?auto=format&fit=crop&w=400&q=80",
            description: "A former temple on the Athenian Acropolis, dedicated to the goddess Athena. It is the most important surviving building of Classical Greece."
        },
        {
            id: 3,
            title: "The Great Sphinx",
            city: "Giza, Egypt",
            coords: [29.9753, 31.1376],
            era: "Old Kingdom",
            image: "https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?auto=format&fit=crop&w=400&q=80",
            description: "A limestone statue of a reclining sphinx, a mythical creature with the head of a human and the body of a lion. It is believed to represent Pharaoh Khafre."
        },
        {
            id: 4,
            title: "Alhambra",
            city: "Granada, Spain",
            coords: [37.1760, -3.5881],
            era: "Nasrid Dynasty",
            image: "https://images.unsplash.com/photo-1523359366921-4c14294ff5bd?auto=format&fit=crop&w=400&q=80",
            description: "A palace and fortress complex. It is one of the most famous monuments of Islamic architecture and one of the best-preserved palaces of the historic Islamic world."
        }
    ];

    const displayArea = document.getElementById('display-area');

    // 4. Function to update the sidebar exhibit
    function showExhibit(data) {
        displayArea.innerHTML = `
            <div class="exhibit-content">
                <span class="era-tag">${data.era}</span>
                <h1>${data.title}</h1>
                <small>${data.city}</small>
                <img src="${data.image}" alt="${data.title}">
                <p>${data.description}</p>
            </div>
        `;
    }

    // 5. Add markers to the map
    historyData.forEach(place => {
        // Create a custom div icon
        const icon = L.divIcon({
            className: 'custom-marker',
            iconSize: [15, 15]
        });

        const marker = L.marker(place.coords, { icon: icon }).addTo(map);

        // HOVER EFFECT
        marker.on('mouseover', function() {
            showExhibit(place);
            this.setZIndexOffset(1000); // Bring marker to front
        });

        // Optional: Click to zoom
        marker.on('click', function() {
            map.flyTo(place.coords, 14);
        });
    });

</script>
</body>
</html>
